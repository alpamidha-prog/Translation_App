<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceFlow - Real-time AI Translation</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>VoiceFlow</h1>

        <div class="toggle-container">
            <span id="label-en" class="language-label active">English</span>
            <label class="switch">
                <input type="checkbox" id="lang-switch">
                <span class="slider"></span>
            </label>
            <span id="label-fi" class="language-label">Finnish</span>
        </div>

        <div class="mic-section">
            <button id="mic-btn" class="mic-btn">
                <i class="fas fa-microphone"></i>
            </button>
            <p id="status" class="status-text">Click to Speak</p>
        </div>

        <div class="results-container">
            <div class="card">
                <div class="card-header">
                    <span>TRANSCRIBED</span>
                    <span id="src-lang-badge">EN</span>
                </div>
                <div id="transcribed-text" class="content">...</div>
            </div>
            <div class="card">
                <div class="card-header">
                    <span>TRANSLATED</span>
                    <span id="dest-lang-badge">FI</span>
                </div>
                <div id="translated-text" class="content">...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
